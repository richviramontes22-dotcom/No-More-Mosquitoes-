[build]
  command = "npm run build:client && npm run bundle:functions"
  functions = "dist/netlify-functions"
  publish = "dist/spa"


[functions]
  node_bundler = "esbuild"

# Scheduled function: send appointment reminders daily at 7:00 AM UTC
[functions.send-reminders]
  schedule = "0 7 * * *"

# Scheduled function: generate recurring appointments daily at 8:00 AM UTC
[functions.generate-appointments]
  schedule = "0 8 * * *"

# Scheduled function: expire annual plans whose current_period_end has passed (daily at 9:00 AM UTC)
[functions.expire-annual-plans]
  schedule = "0 9 * * *"

# Scheduled function: send annual plan expiry warnings (30d, 7d, and expiration emails) daily at 10:00 AM UTC
[functions.send-annual-warnings]
  schedule = "0 10 * * *"

# Scheduled function: routing automation sweep (no-op unless an admin has enabled
# review_window or fully_automatic mode in Route Planning settings) — every 15 minutes
[functions.auto-publish-routes]
  schedule = "*/15 * * * *"

# Force HTTPS redirect
[[redirects]]
  from = "http://*"
  to = "https://:splat"
  status = 301
  force = true

[[redirects]]
  force = true
  from = "/api/*"
  status = 200
  to = "/.netlify/functions/api/:splat"

# SPA catch-all: serve index.html for all non-API, non-asset routes.
# Required so direct navigation (e.g. password reset email links to /reset-password)
# loads the React SPA instead of returning a Netlify 404.
# MUST come after the /api/* rule so API calls are not intercepted.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
